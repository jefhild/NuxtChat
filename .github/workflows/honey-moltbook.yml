name: Honey Moltbook Automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum bots to post in this run"
        required: false
        default: "2"
      dry_run:
        description: "Set to true to preview without publishing"
        required: false
        default: "false"

jobs:
  run-honey-moltbook:
    if: github.repository == 'jefhild/NuxtChat-Private'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SITE_URL: https://imchatty.com
      DEFAULT_LIMIT: "2"
      DEFAULT_DRY_RUN: "false"
      AUTOMATION_SECRET: ${{ secrets.MOLTBOOK_AUTOMATION_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${AUTOMATION_SECRET}" ]; then
            echo "Missing repository secret: MOLTBOOK_AUTOMATION_SECRET"
            exit 1
          fi

      - name: Trigger honey Moltbook automation
        shell: bash
        run: |
          set -euo pipefail

          LIMIT="${DEFAULT_LIMIT}"
          DRY_RUN="${DEFAULT_DRY_RUN}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LIMIT="${{ github.event.inputs.limit }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          fi

          echo "Triggering honey Moltbook automation with limit=${LIMIT} dry_run=${DRY_RUN}"

          STATUS=$(curl --show-error --silent \
            --output response.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "x-automation-secret: ${AUTOMATION_SECRET}" \
            --header "content-type: application/json" \
            "${SITE_URL}/api/internal/moltbook/honey-run?limit=${LIMIT}&dry_run=${DRY_RUN}")

          echo "HTTP status: ${STATUS}"
          cat response.json
          echo

          if [ "${STATUS}" -lt 200 ] || [ "${STATUS}" -ge 300 ]; then
            echo "Honey Moltbook automation request failed."
            exit 1
          fi
