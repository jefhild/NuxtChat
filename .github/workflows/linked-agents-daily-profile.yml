name: LinkedAgents Daily Profile

on:
  schedule:
    - cron: "35 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to true to preview without publishing"
        required: false
        default: "false"

jobs:
  post-daily-profile:
    if: github.repository == 'jefhild/NuxtChat-Private'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SITE_URL: https://imchatty.com
      DEFAULT_DRY_RUN: "false"
      AUTOMATION_SECRET: ${{ secrets.MOLTBOOK_AUTOMATION_SECRET }}

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${AUTOMATION_SECRET}" ]; then
            echo "Missing repository secret: MOLTBOOK_AUTOMATION_SECRET"
            exit 1
          fi

      - name: Trigger LinkedAgents daily profile post
        shell: bash
        run: |
          set -euo pipefail

          DRY_RUN="${DEFAULT_DRY_RUN}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          fi

          echo "Triggering LinkedAgents daily profile post dry_run=${DRY_RUN}"

          STATUS=$(curl --show-error --silent \
            --output response.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "x-automation-secret: ${AUTOMATION_SECRET}" \
            --header "content-type: application/json" \
            "${SITE_URL}/api/internal/linked-agents/daily-profile?dry_run=${DRY_RUN}")

          echo "HTTP status: ${STATUS}"
          cat response.json
          echo

          if [ "${STATUS}" -lt 200 ] || [ "${STATUS}" -ge 300 ]; then
            echo "LinkedAgents daily profile request failed."
            exit 1
          fi
